<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f948c" />
    <title>Googleマップ Web - MultiLookup</title>
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=8" />
  </head>
  <body>
    <main class="map-helper-shell">
      <section class="map-helper-header">
        <div>
          <p class="muted-label">MultiLookup</p>
          <h1>Googleマップ Web</h1>
          <div class="helper-query" id="queryText">検索語を読み込み中</div>
        </div>
        <div class="helper-actions">
          <button class="primary-button compact-button" id="copyQueryButton" type="button">検索語をコピー</button>
          <a class="secondary-button" id="mapsLink" target="_blank" rel="noopener">Googleで開く</a>
        </div>
      </section>
      <iframe class="map-frame" id="mapFrame" title="Googleマップ Web" loading="lazy"></iframe>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const query = params.get("q") || "";
      const queryText = document.querySelector("#queryText");
      const copyButton = document.querySelector("#copyQueryButton");
      const mapsLink = document.querySelector("#mapsLink");
      const mapFrame = document.querySelector("#mapFrame");
      queryText.textContent = query || "検索語がありません";
      mapFrame.src = `https://maps.google.com/maps?q=${encodeURIComponent(query)}&output=embed`;
      mapsLink.href = `https://www.google.com/search?q=${encodeURIComponent(`${query} 地図`)}`;
      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(query);
          copyButton.textContent = "コピー済み";
        } catch {
          const input = document.createElement("input");
          input.value = query;
          document.body.append(input);
          input.select();
          document.execCommand("copy");
          input.remove();
          copyButton.textContent = "コピー済み";
        }
      });
    </script>
  </body>
</html>
