<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f948c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MultiLookup" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>MultiLookup</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=14" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar" aria-label="検索入力">
        <header class="brand-row">
          <div class="brand-lockup">
            <div class="brand-mark" aria-hidden="true">⌕</div>
            <div>
              <h1>MultiLookup</h1>
              <p>串刺し検索</p>
            </div>
          </div>
          <button class="icon-button" id="settingsButton" type="button" aria-label="検索先設定" disabled>
            <span aria-hidden="true">☷</span>
          </button>
        </header>

        <form class="search-panel" id="searchForm">
          <label class="sr-only" for="queryInput">調べたい言葉</label>
          <div class="input-wrap">
            <span aria-hidden="true">⌕</span>
            <input id="queryInput" autocomplete="off" enterkeyhint="search" placeholder="調べたい言葉を入力" />
          </div>
          <button class="primary-button" type="submit">
            <span aria-hidden="true">⌕</span>
            検索
          </button>
        </form>

        <section class="quick-open-section" id="quickOpenSection" hidden>
          <div class="section-heading compact-heading">
            <h2>すぐ開く</h2>
            <button class="text-button" id="quickOpenAllButton" type="button">連続</button>
          </div>
          <div class="quick-open-grid" id="quickOpenGrid"></div>
          <div class="ai-open-block" id="aiOpenBlock" hidden>
            <div class="ai-open-label">AIで開く</div>
            <div class="ai-open-grid" id="aiOpenGrid"></div>
          </div>
        </section>

        <details class="section-block collapsible-section">
          <summary>
            <span>カテゴリ</span>
            <span aria-hidden="true">開く</span>
          </summary>
          <div class="category-list" id="categoryList" role="tablist" aria-label="カテゴリ"></div>
        </details>

        <details class="section-block collapsible-section">
          <summary>
            <span>検索履歴</span>
            <span aria-hidden="true">開く</span>
          </summary>
          <div class="collapsible-actions">
            <button class="text-button" id="clearHistoryButton" type="button">履歴を消去</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </details>
      </section>

      <section class="results-pane" aria-label="検索結果">
        <div class="results-header">
          <div>
            <p class="muted-label">検索結果</p>
            <h2 id="resultTitle">検索語を入力</h2>
            <p id="resultMeta">左の入力欄に言葉を入れて検索します。</p>
          </div>
          <button class="secondary-button" id="openBatchButton" type="button" disabled>連続で開く</button>
        </div>
        <div class="launcher-panel" id="launcherPanel" hidden>
          <div>
            <strong id="launcherTitle">次の検索先</strong>
            <p id="launcherMeta">検索先を順番に開きます。</p>
          </div>
          <button class="primary-button compact-button" id="openNextButton" type="button">次を開く</button>
        </div>
        <div class="result-list" id="resultList"></div>
      </section>
    </main>

    <dialog class="settings-dialog" id="settingsDialog" aria-labelledby="settingsTitle">
      <form method="dialog" class="settings-card">
        <header class="settings-header">
          <h2 id="settingsTitle">検索先設定</h2>
          <button class="icon-button" value="close" aria-label="閉じる" type="submit">×</button>
        </header>

        <section class="settings-section">
          <div class="quick-setting">
            <label>
              <input id="quickOpenInput" type="checkbox" />
              <span>検索時に先頭の検索先をすぐ開く</span>
            </label>
          </div>

          <div class="section-heading">
            <h3>検索先</h3>
            <span id="saveStatus">設定を読み込み中</span>
          </div>
          <div class="provider-settings" id="providerSettings"></div>
        </section>

        <section class="settings-section">
          <h3>設定の移行</h3>
          <div class="settings-actions">
            <button class="secondary-button" id="exportButton" type="button">JSONを書き出す</button>
            <label class="file-button">
              JSONを読み込む
              <input id="importInput" type="file" accept="application/json,.json" />
            </label>
          </div>
          <p class="settings-note">Web版はiCloud KVSを直接使えないため、iCloud Drive等にJSONを保存して移行します。</p>
        </section>
      </form>
    </dialog>

    <script src="./app.js?v=14" type="module"></script>
  </body>
</html>
