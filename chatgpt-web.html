<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f948c" />
    <title>ChatGPT Web - MultiLookup</title>
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=12" />
  </head>
  <body>
    <main class="helper-shell">
      <section class="helper-panel">
        <p class="muted-label">MultiLookup</p>
        <h1>ChatGPT Web</h1>
        <div class="helper-query" id="queryText">検索語を読み込み中</div>
        <div class="helper-actions">
          <button class="primary-button compact-button" id="copyQueryButton" type="button">検索語をコピー</button>
          <a class="secondary-button" id="chatgptLink" target="_blank" rel="noopener">Web版を開く</a>
        </div>
        <p class="settings-note">
          iPhoneがChatGPTアプリへ切り替える場合は、検索語をコピーしてSafariのChatGPT Webへ貼り付けます。
        </p>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const query = params.get("q") || "";
      const queryText = document.querySelector("#queryText");
      const copyButton = document.querySelector("#copyQueryButton");
      const chatgptLink = document.querySelector("#chatgptLink");
      queryText.textContent = query || "検索語がありません";
      chatgptLink.href = `https://chatgpt.com/?hints=search&q=${encodeURIComponent(query)}`;
      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(query);
          copyButton.textContent = "コピー済み";
        } catch {
          const input = document.createElement("input");
          input.value = query;
          document.body.append(input);
          input.select();
          document.execCommand("copy");
          input.remove();
          copyButton.textContent = "コピー済み";
        }
      });
    </script>
  </body>
</html>
